<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaRules Voice Demo</title>
</head>
<body>
  <h1>RestaRules Voice Demo</h1>
  <p id="status">Loading SDK...</p>
  <script src="bundle.js"></script>
  <script>
    if (window.RestaRulesSDK) {
      document.getElementById("status").textContent = "SDK loaded — validateRules: " + typeof window.RestaRulesSDK.validateRules + ", evaluateCompliance: " + typeof window.RestaRulesSDK.evaluateCompliance;
      console.log("SDK loaded successfully", window.RestaRulesSDK);
    } else {
      document.getElementById("status").textContent = "ERROR: SDK failed to load";
    }
  </script>
</body>
</html>
